spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${TEST_DB_USERNAME:test_user}
    password: ${TEST_DB_PASSWORD:test_password}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: none

rpa:
  mattermost:
    base-url: ${TEST_MATTERMOST_BASE_URL:http://localhost:8065}
    token: ${TEST_MATTERMOST_TOKEN:dummy-test-token}
    channel-id: ${TEST_MATTERMOST_CHANNEL_ID:dummy-test-channel}

logging:
  level:
    com.example.rpa: INFO
