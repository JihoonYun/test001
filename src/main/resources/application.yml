spring:
  application:
    name: rpa-batch
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

rpa:
  batch:
    job-name: reportBatchJob
    cron: "0 0 8 * * *"
    scheduler-enabled: true
  excel:
    template-path: classpath:templates/excel/report-template.xlsx
    output-directory: ./output
  mattermost:
    base-url: ${MATTERMOST_BASE_URL:http://localhost:8065}
    token: ${MATTERMOST_TOKEN:dummy-token}
    channel-id: ${MATTERMOST_CHANNEL_ID:dummy-channel-id}

logging:
  config: classpath:logback-spring.xml
