spring:
  datasource:
    url: jdbc:h2:mem:rpa-run;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true

rpa:
  batch:
    scheduler-enabled: false

logging:
  level:
    com.example.rpa: INFO
